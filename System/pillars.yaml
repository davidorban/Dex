# Strategic Pillars Configuration
# 
# Pillars are your main focus areas — think of them as how you carve up your role thematically.
# These are NOT time-bound (like quarterly goals). They represent ongoing areas of responsibility
# that typically stay consistent for 6-12+ months, or until your role significantly changes.
#
# PILLAR (ongoing):           GOAL (time-bound):
# "Revenue Growth"      vs    "Hit 150% quota in Q1"
# "Product Strategy"    vs    "Launch mobile app"
# "Customer Retention"  vs    "Reduce churn to <2%"
#
# Want to change your pillars? Just chat with Claude: "I need to reconfigure my strategic pillars"
# — it'll help you update how your work ladders up to new focus areas.
#
# The Work MCP uses these to categorize tasks and check balance across your work.

pillars:
  - id: al_liwan_labs
    name: "Al Liwan Labs"
    description: "Design, budget, and operate the AI innovation entity — workflow automation, agent deployment, pilot management, AI Knowledge Hours, and the 5-track implementation roadmap (R3)"
    keywords:
      - ai
      - workflows
      - labs
      - innovation
      - agents
      - automation
      - llm
      - claude
      - cowork
      - knowledge hour
      - pilot
      - presentation pipeline
      - deal flow
      - executive intelligence
      - operational documentation
      - contact management
      - role charter

  - id: change_knowledge_mgmt
    name: "Change & Knowledge Management"
    description: "Drive AI adoption across Al Liwan through training, change management, and knowledge capture — AI readiness assessment, champion network, tool deployment (R2/R3)"
    keywords:
      - change management
      - knowledge management
      - adoption
      - training
      - processes
      - governance
      - transformation
      - onboarding
      - knowledge hour
      - intranet
      - documentation

  - id: digital_asset_strategy
    name: "Digital Asset Strategy"
    description: "Lead digital assets strategy, venture studio pipeline, and regulated infrastructure partnerships — Maritime AI, SRI, deal evaluation, regulatory engagement (R4)"
    keywords:
      - digital assets
      - venture studio
      - maritime ai
      - sri
      - partnerships
      - regulated
      - strategy
      - deals
      - investment
      - fintech
      - aml

# Priority limits (how many active tasks per priority level)
priority_limits:
  P0: 3   # Critical/urgent - max 3 at a time
  P1: 5   # Important - max 5 at a time
  P2: 10  # Normal - suggested limit
